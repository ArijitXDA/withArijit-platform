<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <!-- Star mark -->
  <circle cx="24" cy="24" r="14" fill="white" opacity="0.08"/>
  <!-- Connection lines -->
  <line x1="24" y1="10" x2="36" y2="20" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="36" y1="20" x2="30" y2="36" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="30" y1="36" x2="12" y2="30" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="12" y1="30" x2="24" y2="10" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="24" y1="10" x2="30" y2="36" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
  <line x1="36" y1="20" x2="12" y2="30" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
  <!-- Nodes -->
  <circle cx="24" cy="10" r="3.5" fill="white" opacity="0.95"/>
  <circle cx="36" cy="20" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="30" cy="36" r="3" fill="white" opacity="0.85"/>
  <circle cx="12" cy="30" r="2" fill="white" opacity="0.6"/>
  <circle cx="24" cy="23" r="2" fill="white" opacity="0.9"/>
  <!-- Wordmark: "o" in indigo-300, rest in white -->
  <text x="52" y="32" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.5" fill="#a5b4fc">o</text>
  <text x="66" y="32" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.5" fill="white">Staran</text>
</svg>
