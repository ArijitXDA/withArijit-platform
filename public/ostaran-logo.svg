<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <!-- Star mark: constellation of 4 nodes connected by lines -->
  <!-- Outer glow circle -->
  <circle cx="24" cy="24" r="14" fill="url(#bgGrad)" opacity="0.15"/>
  <!-- Connection lines -->
  <line x1="24" y1="10" x2="36" y2="20" stroke="url(#lineGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="36" y1="20" x2="30" y2="36" stroke="url(#lineGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="30" y1="36" x2="12" y2="30" stroke="url(#lineGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="12" y1="30" x2="24" y2="10" stroke="url(#lineGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="24" y1="10" x2="30" y2="36" stroke="url(#lineGrad)" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
  <line x1="36" y1="20" x2="12" y2="30" stroke="url(#lineGrad)" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
  <!-- Nodes -->
  <circle cx="24" cy="10" r="3.5" fill="url(#starGrad1)"/>
  <circle cx="36" cy="20" r="2.5" fill="url(#starGrad2)"/>
  <circle cx="30" cy="36" r="3" fill="url(#starGrad3)"/>
  <circle cx="12" cy="30" r="2" fill="url(#starGrad2)"/>
  <!-- Center node - brightest -->
  <circle cx="24" cy="23" r="2" fill="white" opacity="0.9"/>

  <!-- Wordmark: oStaran -->
  <!-- "o" in indigo -->
  <text x="52" y="32" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.5" fill="#4f46e5">o</text>
  <!-- "Staran" in dark gray -->
  <text x="66" y="32" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.5" fill="#111827">Staran</text>

  <!-- Defs -->
  <defs>
    <linearGradient id="bgGrad" x1="10" y1="10" x2="38" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="10" y1="10" x2="38" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="starGrad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </radialGradient>
    <radialGradient id="starGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
    <radialGradient id="starGrad3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
  </defs>
</svg>
