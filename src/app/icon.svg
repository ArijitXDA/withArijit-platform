<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f4e"/>
      <stop offset="100%" style="stop-color:#1a3a8f"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle top glow -->
  <ellipse cx="16" cy="4" rx="10" ry="4" fill="#3b82f6" opacity="0.35"/>
  <!-- "AI" text -->
  <text x="16" y="22" text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="14"
    letter-spacing="-0.5"
    fill="url(#text)">AI</text>
  <!-- Small dot accent below -->
  <circle cx="16" cy="27" r="1.5" fill="#3b82f6" opacity="0.8"/>
</svg>
